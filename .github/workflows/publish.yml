name: Publish to npm

on:
  push:
    branches:
      - develop
  workflow_dispatch:  # Allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'  # Updated to current recommended LTS (18.x)
          cache: 'npm'        # Built-in npm caching

      - name: Install dependencies
        run: npm ci  # Best practice: use npm ci for consistent builds

      - name: Run tests
        run: npm test

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'  # Ensures publish only from develop branch

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Bump version
        run: |
          # Get current version from package.json
          CURRENT_VERSION=$(npm pkg get version | tr -d '"')
          echo "Current version: $CURRENT_VERSION"
          
          # Check if version exists in npm registry
          NPM_VERSION=$(npm view @callapro/react-native-widget version 2>/dev/null || echo "0.0.0")
          echo "NPM version: $NPM_VERSION"
          
          # If current version already exists, bump it
          if [ "$CURRENT_VERSION" = "$NPM_VERSION" ]; then
            # Delete existing tag if it exists
            git tag -d "v$CURRENT_VERSION" 2>/dev/null || true
            git push origin ":refs/tags/v$CURRENT_VERSION" 2>/dev/null || true
            
            # Generate new version
            NEW_VERSION=$(npm version patch -m "Bump version to %s [skip ci]")
          else
            NEW_VERSION="v$CURRENT_VERSION"
          fi
          
          echo "Version to publish: $NEW_VERSION"
          
          # Push changes
          git push origin develop || exit 1
          git push origin $NEW_VERSION || exit 1
          
          # Set output for use in next step
          echo "PACKAGE_VERSION=${NEW_VERSION#v}" >> $GITHUB_ENV

      - name: Publish package to npm
        run: |
          # Double check we're not publishing an existing version
          NPM_VERSION=$(npm view @callapro/react-native-widget version 2>/dev/null || echo "0.0.0")
          CURRENT_VERSION=$(npm pkg get version | tr -d '"')
          if [ "$CURRENT_VERSION" = "$NPM_VERSION" ]; then
            echo "Error: Version $CURRENT_VERSION already exists in npm registry"
            exit 1
          fi
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
