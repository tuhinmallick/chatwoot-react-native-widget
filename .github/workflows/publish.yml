name: Publish to npm

on:
  push:
    branches:
      - develop
  workflow_dispatch:  # Allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'  # Updated to current recommended LTS (18.x)
          cache: 'npm'        # Built-in npm caching

      - name: Install dependencies
        run: npm ci  # Best practice: use npm ci for consistent builds

      - name: Run tests
        run: npm test

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'  # Ensures publish only from develop branch

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Bump version
        run: |
          # Ensure we have the latest commit
          git pull origin develop
          # Generate new version
          NEW_VERSION=$(npm version patch -m "Bump version to %s [skip ci]")
          echo "New version: $NEW_VERSION"
          # Push both the commit and tag
          git push origin develop
          git push origin $NEW_VERSION
          # Set output for use in next step
          echo "PACKAGE_VERSION=${NEW_VERSION#v}" >> $GITHUB_ENV

      - name: Publish package to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
